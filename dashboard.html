              <span class="depot-fill-percent">${depot.fill}%</span>
            </div>
            <div class="depot-meta">${depot.city}, ${depot.country} &bull; ${count} OBJ</div>
            <div class="depot-progress-bar">
              <div class="depot-progress-fill" style="width: ${depot.fill}%"></div>
            </div>
            ${isActive ? `
            <div class="depot-safety-system">
              <span class="safety-title">FACILITY SAFETY SYSTEM</span>
              <div class="safety-status-row">
                <div class="safety-icons">
                  <div class="tooltip-wrapper" data-tooltip="CE Certification">
                    <img class="safety-icon" src="vector/icons/CE.svg" alt="CE">
                  </div>
                  <div class="tooltip-wrapper" data-tooltip="TÜV Rheinland Certified">
                    <img class="safety-icon" src="vector/icons/TUV.svg" alt="TUV">
                  </div>
                  <div class="tooltip-wrapper" data-tooltip="Geprüfte Sicherheit Safety Certified">
                    <img class="safety-icon" src="vector/icons/GS.svg" alt="GS">
                  </div>
                </div>
                <span class="safety-status">STATUS: VERIFIED</span>
              </div>
            </div>
            ` : ''}
          </div>
        `;
      });

      listEl.innerHTML = html;
      document.getElementById('stat-depots-count').textContent = `${depots.length} ACTIVE`;
    }

    function renderItems() {
      const gridEl = document.getElementById('items-grid');
      const countEl = document.getElementById('items-count-badge');
      if (!gridEl) return;

      const currentLang = localStorage.getItem('lang') || 'UK';
      const dict = translations[currentLang] || translations['UK'];

      // Filter
      let filtered = items.filter(item => {
        const depotMatch = selectedDepotCode === "ALL" || item.depotCode === selectedDepotCode;
        const catMatch = activeFilters.category === "ALL" || item.category === activeFilters.category;
        const accMatch = activeFilters.access === "ALL" || item.access === activeFilters.access;
        return depotMatch && catMatch && accMatch;
      });

      // Sort
      const sortVal = document.getElementById('sort-select').value;
      const [key, dir] = sortVal.split('-');
      filtered.sort((a, b) => {
        let valA = a[key];
        let valB = b[key];
        
        if (key === 'addedDate') {
          valA = new Date(valA);
          valB = new Date(valB);
        }

        if (valA < valB) return dir === 'asc' ? -1 : 1;
        if (valA > valB) return dir === 'asc' ? 1 : -1;
        return 0;
      });

      countEl.textContent = `${filtered.length} OBJECTS FOUND`;

      if (filtered.length === 0) {
        gridEl.innerHTML = `<div class="empty-state">${dict.empty_state}</div>`;
        return;
      }

      let html = "";
      filtered.forEach(item => {
        const dateFormatted = new Date(item.addedDate).toLocaleDateString(currentLang === 'UK' ? 'en-GB' : 'de-DE');
        const statusClass = item.status === 'STORED' ? 'status-active' : '';
        html += `
          <div class="item-card" data-item-id="${item.id}">
            <div class="item-card-image-box">
              <img class="item-card-img" src="${item.image || 'https://images.unsplash.com/photo-1546868871-7041f2a55e12?auto=format&fit=crop&w=600&q=80'}" alt="${item.name}" loading="lazy">
            </div>
            <div class="item-card-body">
              <div class="item-info-stack">
                <div class="item-card-top">
                  <span class="item-id">${item.id}</span>
                  <span class="category-badge"><span class="bracket">[</span>${item.category}<span class="bracket">]</span></span>
                  <div class="tooltip-wrapper" data-tooltip="${sizeConfig[item.size]?.label || item.size}">
                    <img class="meta-icon size-icon" src="vector/icons/${item.size}.svg" alt="${item.size}">
                  </div>
                </div>
                <div class="item-title">${item.name}</div>
              </div>
              <div class="item-meta-row">
                <div class="item-meta-item coordinate-item">
                  <span class="item-meta-label">${dict.unit_lbl.replace(':', '')}</span>
                  <span class="storage-coordinate">${item.coordinate.replace('\n', '<br>')}</span>
                </div>
                <div class="item-meta-item">
                  <span class="item-meta-label">${dict.weight_lbl.replace(':', '')}</span>
                  <span class="item-meta-value">${item.weight.toFixed(1)} KG</span>
                </div>
                <div class="item-meta-item">
                  <span class="item-meta-label">${dict.access_lbl.replace(':', '')}</span>
                  <div class="tooltip-wrapper" data-tooltip="${accessConfig[item.access]?.label || item.access}">
                    <img class="meta-icon access-icon" src="vector/icons/${accessConfig[item.access]?.icon}" alt="${item.access}">
                  </div>
                </div>
                <div class="item-meta-item">
                  <span class="item-meta-label">CONDITIONS</span>
                  <div class="conditions-icons-row">
                    <div class="tooltip-wrapper" data-tooltip="${conditionConfig.temp[item.temp]?.label || item.temp}">
                      <img class="meta-icon cond-icon" src="vector/icons/${conditionConfig.temp[item.temp]?.icon}" alt="${item.temp}">
                    </div>
                    <div class="tooltip-wrapper" data-tooltip="${conditionConfig.hum[item.hum]?.label || item.hum}">
                      <img class="meta-icon cond-icon" src="vector/icons/${conditionConfig.hum[item.hum]?.icon}" alt="${item.hum}">
                    </div>
                    <div class="tooltip-wrapper" data-tooltip="${conditionConfig.light[item.light]?.label || item.light}">
                      <img class="meta-icon cond-icon" src="vector/icons/${conditionConfig.light[item.light]?.icon}" alt="${item.light}">
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="item-card-actions">
              <button class="action-btn" onclick="openMoveDepotModal('${item.id}')">${dict.btn_move}</button>
              <button class="action-btn danger-hover" onclick="removeItem('${item.id}')">${dict.btn_retrieve}</button>
            </div>
          </div>
        `;
      });

      gridEl.innerHTML = html;
    }


    // Select active depot filter
    window.selectDepot = function(depotCode) {
      selectedDepotCode = depotCode;
      renderDepots();
      renderItems();
    };

    // Retrieve/Remove Item
    window.removeItem = function(itemId) {
      const currentLang = localStorage.getItem('lang') || 'UK';
      const confirmMsg = currentLang === 'UK' ? "Are you sure you want to retrieve this object from the depot?" : "Möchten Sie dieses Objekt wirklich aus dem Depot abrufen?";
      if (!confirm(confirmMsg)) return;

      const idx = items.findIndex(i => i.id === itemId);
      if (idx !== -1) {
        const item = items[idx];
        
        // Adjust capacity back on the depot
        const depot = depots.find(d => d.code === item.depotCode);
        if (depot) {
          depot.usedCapacity = Math.max(0, depot.usedCapacity - 1);
          depot.fill = Math.round((depot.usedCapacity / depot.totalCapacity) * 100);
        }

        items.splice(idx, 1);
        saveItemsToStorage();
        renderStats();
        renderDepots();
        renderItems();
      }
    };

    // Move Depot simulation
    window.openMoveDepotModal = function(itemId) {
      const item = items.find(i => i.id === itemId);
      if (!item) return;

      const availableDepots = depots.filter(d => d.code !== item.depotCode && d.fill < 99);
      if (availableDepots.length === 0) {
        alert("No other available depots found in the network.");
        return;
      }

      const depotOptions = availableDepots.map(d => `${d.code} (${d.city})`).join('\n');
      const currentLang = localStorage.getItem('lang') || 'UK';
      const promptMsg = currentLang === 'UK' 
        ? `Enter the target NUTS Depot code to transfer item ${itemId}:\nAvailable options:\n${availableDepots.slice(0, 5).map(d => d.code).join(', ')}...`
        : `Geben Sie den NUTS-Code des Zieldepots für Artikel ${itemId} ein:\nVerfügbare Optionen:\n${availableDepots.slice(0, 5).map(d => d.code).join(', ')}...`;
      
      const targetCode = prompt(promptMsg);
      if (!targetCode) return;

      const targetDepot = depots.find(d => d.code.toUpperCase() === targetCode.trim().toUpperCase());
      if (!targetDepot) {
        alert("Invalid Depot code entered.");
        return;
      }

      // Update capacities
      const oldDepot = depots.find(d => d.code === item.depotCode);
      if (oldDepot) {
        oldDepot.usedCapacity = Math.max(0, oldDepot.usedCapacity - 1);
        oldDepot.fill = Math.round((oldDepot.usedCapacity / oldDepot.totalCapacity) * 100);
      }

      targetDepot.usedCapacity += 1;
      targetDepot.fill = Math.round((targetDepot.usedCapacity / targetDepot.totalCapacity) * 100);

      item.depotCode = targetDepot.code;
      // Generate a new unit coordinate inside target depot
      item.coordinate = generateStorageCoordinate(targetDepot.code, targetDepot.city);
      
      saveItemsToStorage();
      renderStats();
      renderDepots();
      renderItems();
    };

    // 6. Sliding Form Interface
    const openAddBtn = document.getElementById('open-add-panel-btn');
    const closeAddBtn = document.getElementById('close-add-panel-btn');
    const addOverlay = document.getElementById('add-panel-overlay');
    const addPanel = document.getElementById('add-item-panel');
    const addForm = document.getElementById('add-item-form');
    const formDepotInput = document.getElementById('form-item-depot');
    const depotSelectGrid = document.getElementById('depot-button-select');

    function setupCustomSelectors() {
      // 1. Category selector
      const catSelectGrid = document.getElementById('category-button-select');
      const catInput = document.getElementById('form-item-category');
      if (catSelectGrid && catInput) {
        const buttons = catSelectGrid.querySelectorAll('.select-option-btn');
        buttons.forEach(btn => {
          btn.addEventListener('click', () => {
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            catInput.value = btn.getAttribute('data-value');
          });
        });
      }

      // 2. Access selector
      const accessSelectGrid = document.getElementById('access-button-select');
      const accessInput = document.getElementById('form-item-access');
      if (accessSelectGrid && accessInput) {
        const buttons = accessSelectGrid.querySelectorAll('.select-option-btn');
        buttons.forEach(btn => {
          btn.addEventListener('click', () => {
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            accessInput.value = btn.getAttribute('data-value');
          });
        });
      }

      // 3. Size selector
      const sizeSelectGrid = document.getElementById('size-button-select');
      const sizeInput = document.getElementById('form-item-size');
      if (sizeSelectGrid && sizeInput) {
        const buttons = sizeSelectGrid.querySelectorAll('.select-option-btn');
        buttons.forEach(btn => {
          btn.addEventListener('click', () => {
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            sizeInput.value = btn.getAttribute('data-value');
          });
        });
      }
    }

    function resetCustomSelectors() {
      // Reset inputs
      document.getElementById('form-item-category').value = "TECH";
      document.getElementById('form-item-access').value = "HOT";
      document.getElementById('form-item-size').value = "M";

      // Reset button active classes
      document.querySelectorAll('#category-button-select .select-option-btn').forEach(btn => {
        if (btn.getAttribute('data-value') === "TECH") btn.classList.add('active');
        else btn.classList.remove('active');
      });
      document.querySelectorAll('#access-button-select .select-option-btn').forEach(btn => {
        if (btn.getAttribute('data-value') === "HOT") btn.classList.add('active');
        else btn.classList.remove('active');
      });
      document.querySelectorAll('#size-button-select .select-option-btn').forEach(btn => {
        if (btn.getAttribute('data-value') === "M") btn.classList.add('active');
        else btn.classList.remove('active');
      });
    }

    function toggleAddPanel(show) {
      if (show) {
        // Populate Depot button options dynamically
        let buttonsHtml = "";
        let firstAvailableDepot = "";
        depots.forEach(d => {
          if (d.fill < 99) {
            if (!firstAvailableDepot) firstAvailableDepot = d.code;
            const activeClass = d.code === firstAvailableDepot ? "active" : "";
            buttonsHtml += `
              <button type="button" class="select-option-btn depot-select-btn ${activeClass}" data-value="${d.code}">
                <span>${d.code}</span>
                <span class="option-desc">${d.city} &bull; ${d.fill}%</span>
              </button>
            `;
          }
        });
        depotSelectGrid.innerHTML = buttonsHtml;
        formDepotInput.value = firstAvailableDepot;

        // Add event listeners to newly created depot buttons
        const depotButtons = depotSelectGrid.querySelectorAll('.depot-select-btn');
        depotButtons.forEach(btn => {
          btn.addEventListener('click', () => {
            depotButtons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            formDepotInput.value = btn.getAttribute('data-value');
          });
        });

        // Set default values for other inputs and reset button active states
        resetCustomSelectors();

        addOverlay.classList.add('visible');
        addPanel.classList.add('visible');
      } else {
        addOverlay.classList.remove('visible');
        addPanel.classList.remove('visible');
        addForm.reset();
      }
    }

    openAddBtn.addEventListener('click', () => toggleAddPanel(true));
    closeAddBtn.addEventListener('click', () => toggleAddPanel(false));
    addOverlay.addEventListener('click', () => toggleAddPanel(false));

    // Form Submission
    addForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const name = document.getElementById('form-item-name').value.trim();
      const category = document.getElementById('form-item-category').value;
      const depotCode = formDepotInput.value;
      const access = document.getElementById('form-item-access').value;
      const size = document.getElementById('form-item-size').value;
      const weight = parseFloat(document.getElementById('form-item-weight').value);

      // Generate ID e.g. AD-048271
      const randNum = Math.floor(100000 + Math.random() * 900000);
      const id = `AD-${randNum}`;

      // Generate storage coordinates
      const targetDepot = depots.find(d => d.code === depotCode);
      const coordinate = generateStorageCoordinate(depotCode, targetDepot ? targetDepot.city : "Berlin");

      // Map category to image URL on clean white background
      const categoryImages = {
        MEDA: "https://images.unsplash.com/photo-1546435770-a3e426bf472b?auto=format&fit=crop&w=600&q=80", // headphones
        TECH: "https://images.unsplash.com/photo-1546868871-7041f2a55e12?auto=format&fit=crop&w=600&q=80", // smartwatch
        ARCH: "https://images.unsplash.com/photo-1586075010923-2dd45e9b2d4f?auto=format&fit=crop&w=600&q=80", // document folder
        FURN: "https://images.unsplash.com/photo-1524758631624-e2822e304c36?auto=format&fit=crop&w=600&q=80", // chair/furniture
        TXTL: "https://images.unsplash.com/photo-1583847268964-b28dc8f51f92?auto=format&fit=crop&w=600&q=80", // textile roll
        TOOL: "https://images.unsplash.com/photo-1581147036324-c17ac41dfa6c?auto=format&fit=crop&w=600&q=80", // tools
        SPRT: "https://images.unsplash.com/photo-1532298229144-0ec0c57515c7?auto=format&fit=crop&w=600&q=80", // bicycle
        CLCT: "https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?auto=format&fit=crop&w=600&q=80", // polaroid camera
        VEHC: "https://images.unsplash.com/photo-1486006920555-c77dce18193b?auto=format&fit=crop&w=600&q=80", // wheel/car part
        HOME: "https://images.unsplash.com/photo-1485955900006-10f4d324d411?auto=format&fit=crop&w=600&q=80", // succulent plant
        BIZN: "https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&w=600&q=80", // office/business
        OTHR: "https://images.unsplash.com/photo-1513151233558-d860c5398176?auto=format&fit=crop&w=600&q=80"  // other abstract
      };
      const image = categoryImages[category] || categoryImages.TECH;

      // Add to array
      const conditions = getCategoryConditions(category);
      items.push({
        id: id,
        name: name,
        category: category,
        depotCode: depotCode,
        coordinate: coordinate,
        access: access,
        size: size,
        weight: weight,
        addedDate: new Date().toISOString(),
        status: "STORED",
        temp: conditions.temp,
        hum: conditions.hum,
        light: conditions.light,
        image: image
      });

      // Update Depot Fill rate
      if (targetDepot) {
        targetDepot.usedCapacity += 1;
        targetDepot.fill = Math.round((targetDepot.usedCapacity / targetDepot.totalCapacity) * 100);
      }

      saveItemsToStorage();
      toggleAddPanel(false);
      
      // Select the depot that the item was added to
      selectedDepotCode = depotCode;
      
      renderStats();
      renderDepots();
      renderItems();
    });

    // 7. Theme Engine & Synchronization
    const themeToggleBtns = document.querySelectorAll('.theme-toggle-btn');
    
    function applyTheme(theme) {
      if (theme === 'dark') {
        document.body.classList.add('dark-theme');
      } else {
        document.body.classList.remove('dark-theme');
      }
    }

    // Apply initial theme from localStorage
    const savedTheme = localStorage.getItem('theme') || 'light';
    applyTheme(savedTheme);

    // Event listener for header theme buttons
    themeToggleBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const currentlyDark = document.body.classList.contains('dark-theme');
        const newTheme = currentlyDark ? 'light' : 'dark';
        localStorage.setItem('theme', newTheme);
        applyTheme(newTheme);
      });
    });

    // 11. View Mode Engine (Grid / List)
    const viewGridBtn = document.getElementById('view-grid-btn');
    const viewListBtn = document.getElementById('view-list-btn');
    const itemsGrid = document.getElementById('items-grid');

    function applyViewMode(mode) {
      if (mode === 'list') {
        itemsGrid.classList.add('list-view');
        viewListBtn.classList.add('active');
        viewGridBtn.classList.remove('active');
      } else {
        itemsGrid.classList.remove('list-view');
        viewGridBtn.classList.add('active');
        viewListBtn.classList.remove('active');
      }
    }

    // Load initial view mode from localStorage
    const savedViewMode = localStorage.getItem('dashboard_view_mode') || 'grid';
    applyViewMode(savedViewMode);

    viewGridBtn.addEventListener('click', () => {
      localStorage.setItem('dashboard_view_mode', 'grid');
      applyViewMode('grid');
    });

    viewListBtn.addEventListener('click', () => {
      localStorage.setItem('dashboard_view_mode', 'list');
      applyViewMode('list');
    });

    // 8. Language Selection & i18n
    const langBtn = document.querySelector('.lang-btn');
    const langContainer = document.querySelector('.lang-selector-container');
    const langOpts = document.querySelectorAll('.lang-opt');

    // Toggle dropdown
    if (langBtn) {
      langBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const expanded = langBtn.getAttribute('aria-expanded') === 'true';
        langBtn.setAttribute('aria-expanded', !expanded);
        langContainer.classList.toggle('active');
      });
    }

    // Close dropdown on outside click
    document.addEventListener('click', () => {
      if (langBtn) {
        langBtn.setAttribute('aria-expanded', 'false');
        langContainer.classList.remove('active');
      }
    });

    // Handle language switch
    langOpts.forEach(opt => {
      opt.addEventListener('click', (e) => {
        e.stopPropagation();
        const langCode = opt.getAttribute('data-lang');
        
        // Update active class
        langOpts.forEach(o => o.classList.remove('active'));
        opt.classList.add('active');

        // Update button label
        if (langBtn) {
          langBtn.innerHTML = `${langCode} <svg class="lang-btn-arrow" viewBox="0 0 6 4" xmlns="http://www.w3.org/2000/svg"><path d="M0 0L3 3L6 0H0Z" fill="currentColor"/></svg>`;
          langBtn.setAttribute('aria-expanded', 'false');
        }
        langContainer.classList.remove('active');

        // Save lang and update translations
        localStorage.setItem('lang', langCode);
        updateTranslations(langCode);
      });
    });

    function updateTranslations(langCode) {
      const dict = translations[langCode] || translations['UK'];
      
      // Update page meta elements
      document.querySelectorAll('[data-i18n-key]').forEach(el => {
        const key = el.getAttribute('data-i18n-key');
        if (dict[key]) {
          el.textContent = dict[key];
        }
      });

      // Update nav link placeholders
      document.querySelectorAll('[data-i18n-link]').forEach(link => {
        const textSpan = link.querySelector('.nav-link-text');
        if (textSpan) {
          const key = textSpan.getAttribute('data-i18n-key');
          if (dict[key]) {
            link.setAttribute('data-text', dict[key]);
          }
        }
      });

      // Re-render items and depots to show translated labels
      renderItems();
      renderDepots();
    }

    // 9. Controls Handlers (Filters & Sorting)
    const filterBtns = document.querySelectorAll('.filter-btn');
    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const type = btn.getAttribute('data-filter-type');
        const val = btn.getAttribute('data-filter-val');
        
        // Remove active class from sibling filter buttons
        document.querySelectorAll(`.filter-btn[data-filter-type="${type}"]`).forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        activeFilters[type] = val;
        renderItems();
      });
    });

    document.getElementById('sort-select').addEventListener('change', renderItems);

    // 10. Startup Initialization
    window.addEventListener('DOMContentLoaded', () => {
      setupCustomSelectors();
      initData();
      const urlParams = new URLSearchParams(window.location.search);
      const queryDepot = urlParams.get('depot');
      if (queryDepot) {
        selectedDepotCode = queryDepot;
      }
      renderStats();
      renderDepots();
      
      // Initial language selection matching localStorage
      const savedLang = localStorage.getItem('lang') || 'UK';
      const activeOpt = document.querySelector(`.lang-opt[data-lang="${savedLang}"]`);
      if (activeOpt) {
        activeOpt.click();
      } else {
        updateTranslations('UK');
      }

      // Mobile Menu Drawer Toggle Logic
      const burgerBtn = document.querySelector('.burger-menu-btn');
      const closeBtn = document.querySelector('.close-drawer-btn');
      const drawer = document.getElementById('mobile-menu-drawer');
      
      if (burgerBtn && drawer) {
        burgerBtn.addEventListener('click', () => {
          drawer.classList.add('active');
          burgerBtn.setAttribute('aria-expanded', 'true');
          document.body.style.overflow = 'hidden';
        });
      }
      
      if (closeBtn && drawer) {
        closeBtn.addEventListener('click', () => {
          drawer.classList.remove('active');
          if (burgerBtn) burgerBtn.setAttribute('aria-expanded', 'false');
          document.body.style.overflow = '';
        });
      }
      
      const mobileNavLinks = document.querySelectorAll('.mobile-nav-link');
      mobileNavLinks.forEach(link => {
        link.addEventListener('click', () => {
          drawer.classList.remove('active');
          if (burgerBtn) burgerBtn.setAttribute('aria-expanded', 'false');
          document.body.style.overflow = '';
        });
      });
    });
  </script>
</body>
</html>
